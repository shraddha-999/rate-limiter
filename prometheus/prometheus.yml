global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "rate-limiter"

scrape_configs:
  - job_name: "rate_limiter_api"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    # Redis metrics via redis_exporter would go here in a full setup

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
