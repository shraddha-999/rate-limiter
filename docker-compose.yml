version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: rate_limiter_api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - STORAGE_BACKEND=redis
      - DEFAULT_ALGORITHM=sliding_window
      - DEFAULT_LIMIT=100
      - DEFAULT_WINDOW_SECONDS=60
      - LOG_LEVEL=INFO
      - LOG_FORMAT=json
      - ADMIN_API_KEY=${ADMIN_API_KEY:-change-me-in-production}
      - ALLOWED_API_KEYS=${ALLOWED_API_KEYS:-}
      - FREE_TIER_LIMIT=100
      - PREMIUM_TIER_LIMIT=1000
      - ENTERPRISE_TIER_LIMIT=999999
      - PROMETHEUS_ENABLED=true
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - rate_limiter_net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: rate_limiter_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - rate_limiter_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: rate_limiter_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    networks:
      - rate_limiter_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    container_name: rate_limiter_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - rate_limiter_net
    restart: unless-stopped

networks:
  rate_limiter_net:
    driver: bridge

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
